<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente Jardim das Rosas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(145deg, #0a2f6c, #041a3a);
  margin: 0;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.main-container {
  width: 100%;
  max-width: 900px;
  background: #0f1a24;
  border-radius: 40px;
  padding: 20px;
  border: 1px solid #d32f2f;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(10,47,108,0.85);
  padding: 12px 20px;
  border-radius: 50px;
  margin-bottom: 20px;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-area img {
  height: 45px;
  background: white;
  border-radius: 10px;
  padding: 4px;
}

.logo-area span {
  color: #ffec9e;
  font-weight: 600;
}

.title-badge {
  background: #d32f2f;
  color: white;
  padding: 6px 15px;
  border-radius: 30px;
  font-weight: bold;
  font-size: 0.85rem;
}

.chat-card {
  background: white;
  border-radius: 25px;
  padding: 25px;
}

#chat-box {
  height: 420px;
  overflow-y: auto;
  border: 1px solid #eee;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  background: #f9f9f9;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.message {
  max-width: 85%;
  padding: 12px 18px;
  border-radius: 15px;
  font-size: 0.95rem;
  line-height: 1.5;
}

.user {
  align-self: flex-end;
  background: #0a2f6c;
  color: white;
  border-bottom-right-radius: 2px;
}

.bot {
  align-self: flex-start;
  background: #e9e9e9;
  color: #333;
  border-bottom-left-radius: 2px;
  border-left: 5px solid #d32f2f;
}

.input-area {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 15px 20px;
  border-radius: 30px;
  border: 2px solid #ddd;
  outline: none;
  font-size: 1rem;
}

button {
  background: #d32f2f;
  color: white;
  border: none;
  padding: 0 30px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #b71c1c;
}
</style>
</head>

<body>

<div class="main-container">

  <div class="header">
    <div class="logo-area">
      <img src="https://i.ibb.co/0p01LzxB/logo3de.jpg">
      <span>Jardim das Rosas</span>
    </div>
    <div class="title-badge">Assistente Pedagógico</div>
  </div>

  <div class="chat-card">
    <h3>🌹 Assistente Pedagógico Escolar</h3>

    <div id="chat-box">
      <div class="message bot">
        Olá! Sou o assistente pedagógico da escola <b>Jardim das Rosas</b>.
        Posso responder perguntas com base no material didático.
      </div>
    </div>

    <div class="input-area">
      <input id="userInput" placeholder="Digite sua pergunta..." autocomplete="off">
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

</div>

<script src="dados.js"></script>
<script src="script.js"></script>
</body>
</html>
